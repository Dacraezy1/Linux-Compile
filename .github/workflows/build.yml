name: Build Custom Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build package in Arch Linux container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            archlinux:latest \
            bash -c "
              # Initialize keyring and system packages
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm
              pacman -S --noconfirm base-devel git sudo

              # Create a non-root user 'builder' for makepkg
              useradd -m builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
              chown -R builder:builder /workspace

              # Import GPG keys for signature verification
              sudo -u builder gpg --import /workspace/keys/pgp/*.asc

              # Run makepkg as the builder user to fetch deps and compile
              sudo -u builder makepkg -s --noconfirm
            "

      - name: Upload compiled kernel packages
        uses: actions/upload-artifact@v4
        with:
          name: compiled-kernel
          path: |
            *.pkg.tar.zst
